<!--health_safety.html -->
<!-- ISO Timestamp: 2025-03-06T14:30:00Z -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Health & Safety Advisor</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f2ee;
      padding: 40px;
      max-width: 700px;
      margin: auto;
      color: #0b1f2a;
    }

    .top-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    #page-iso,
    .iso-pill {
      font-size: 0.85rem;
      color: #415a67;
      background: #e6e7e2;
      border: 1px solid #d9dad5;
      padding: 6px 10px;
      display: inline-block;
      border-radius: 0;
      font-weight: 600;
    }

    .iso-note {
      font-size: 0.95rem;
      color: #415a67;
      text-align: center;
      line-height: 1.5;
      margin-top: 0;
      margin-bottom: 14px;
    }

    h2 { 
      text-align: center; 
      color: #111111; 
    }

    h3 {
      text-align: center;
      color: #111111;
    }
    
    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
      color: #111111;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input,
    textarea {
      border: 1px solid #0b1f2a;
      border-left: 4px solid #ff6a00;
      border-radius: 0;
      background: #ffffff;
      color: #0b1f2a;
    }

    textarea { 
      resize: vertical; 
      min-height: 100px; 
    }

    button {
      background-color: #14232b;
      color: white;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover { 
      background-color: #0b1f2a; 
    }

    /* -------------------------------------------------
       REPORT OUTPUT AREA (UPDATED TO ARIAL)
    ------------------------------------------------- */
    pre {
      background: #ffffff;
      padding: 15px;
      border: 1px solid #d9dad5;
      border-left: 4px solid #ff6a00;
      border-radius: 0;
      white-space: pre-wrap;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      color: #0b1f2a;
    }

    .terms-box {
      font-size: 14px;
      margin-top: 15px;
      margin-bottom: 10px;
      color: #0b1f2a;
    }

    .terms-box a { 
      color: #ff6a00; 
      text-decoration: underline; 
    }

    #response strong {
      font-weight: bold;
      color: #111111;
    }

    #indexTimestamp, #budgetNotice {
      text-align: right;
      font-size: 0.9em;
      color: #415a67;
    }

    #indexTimestamp { margin-top: -5px; }
    #budgetNotice { margin-bottom: 20px; }

    /* --- Clear button -------------------------------------------- */
    #clearResultsBtn {
      background: #14232b;
      color: #fff;
      border: none;
      border-radius: 0;
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin: 25px 0 15px auto;
      display: none;
    }

    #clearResultsBtn:hover { 
      background: #0b1f2a; 
    }

  </style>
</head>

<body>

  <div class="top-meta">
    <div id="page-iso">🕒 ISO Timestamp: <span id="iso-timestamp"></span></div>
    <div class="iso-pill">ISO/IEC 42001</div>
  </div>

  <h2>Health & Safety Assistant</h2>

  <p class="iso-note">
    Operated within AIVS Software Limited’s ISO/IEC 42001-certified AI management system.
  </p>

  <div id="indexTimestamp">🗂️ Databank Last Updated: 2025-10-20T11:30:00Z</div>

  <label for="clarification">Question or topic</label>
  <textarea id="clarification"
    placeholder="e.g. Explain risk assessment requirements for lone workers"></textarea>

  <label for="email">Your Email</label>
  <input type="email" id="email" placeholder="you@example.com" />

  <label for="managerEmail">Manager Email (or file copy)</label>
  <input type="email" id="managerEmail" placeholder="manager@firm.co.uk" />

  <label for="clientEmail">Audit Email</label>
  <input type="email" id="clientEmail" placeholder="client@theirbusiness.co.uk" />

  <div class="terms-box">
    <label>
      <input type="checkbox" id="termsCheckbox" checked />
      I have read and agree to the
      <a href="https://www.aivs.uk/ai-disclosure" target="_blank">Terms and Conditions</a>.
    </label>
  </div>

  <button id="generate">Generate Health & Safety Report</button>
  <button id="clearResultsBtn">Clear Results</button>

  <h3>Report Output</h3>
  <pre id="response"></pre>

  <script src="script.js?v=2025-10-16T11:45:00Z"></script>

  <script>
    const termsCheckbox = document.getElementById("termsCheckbox");
    const generateBtn = document.getElementById("generate");
    termsCheckbox.addEventListener("change", () => {
      generateBtn.disabled = !termsCheckbox.checked;
    });
  </script>

  <script>
    function sendHeight() {
      window.parent.postMessage(
        { type: "resizeIframe", height: document.body.scrollHeight },
        "*"
      );
    }
    window.addEventListener("load", sendHeight);
    new ResizeObserver(sendHeight).observe(document.body);
  </script>

  <script>
    async function loadIndexTimestamp() {
      try {
        const res = await fetch("/index-date");
        const data = await res.json();
        document.getElementById("indexTimestamp").textContent =
          `🗂️ Databank Last Updated: ${data.lastUpdated}`;
      } catch {}
    }
    window.addEventListener("load", loadIndexTimestamp);

    document.addEventListener("DOMContentLoaded", () => {
      const iso = new Date().toISOString();
      document.getElementById("iso-timestamp").textContent = iso;
    });
  </script>

  <!-- Clear button logic -->
  <script>
    const clearBtn = document.getElementById("clearResultsBtn");
    const responseBox = document.getElementById("response");
    const clarificationField = document.getElementById("clarification");

    clearBtn.addEventListener("click", () => {
      responseBox.textContent = "";
      clarificationField.value = "";
      clearBtn.style.display = "none";
    });
  </script>

</body>
</html>
